@if (isOpen()) {
  <div
    class="drawer-backdrop"
    (click)="onBackdropClick()"
    (keydown.enter)="onBackdropClick()"
    tabindex="-1"
  >
    <div
      #drawerPanel
      class="drawer-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="drawer-title"
      tabindex="-1"
      (click)="onDrawerClick($event)"
      (keydown)="onDrawerKeyDown($event)"
      (keyup.escape)="closeDrawer.emit()"
    >
      <div class="drawer-header">
        <h2 id="drawer-title">Outils</h2>
        <button type="button" class="close-btn" (click)="closeDrawer.emit()" aria-label="Fermer">
          ×
        </button>
      </div>
      <nav class="drawer-nav">
        <button type="button" class="nav-item" (click)="navigateTo('/today')">Aujourd'hui</button>
        <button type="button" class="nav-item" (click)="navigateTo('/health')">Dossiers</button>
        <button type="button" class="nav-item" (click)="navigateTo('/families')">
          Familles (admin)
        </button>
        <button type="button" class="nav-item" (click)="navigateTo('/groups')">
          Enfants par groupe
        </button>
      </nav>
    </div>
  </div>
}
